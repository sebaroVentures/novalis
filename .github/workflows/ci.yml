name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      # Tauri's Linux build needs the WebKitGTK stack (see plan: Linux WebKitGTK risk);
      # libasound2-dev provides the ALSA headers cpal (native voice capture) links against.
      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libxdo-dev \
            libasound2-dev \
            patchelf \
            build-essential

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      # dtolnay/rust-toolchain can't read rust-toolchain.toml (its `toolchain`
      # input is required at @master), so the pin is duplicated here — keep it
      # in sync with rust-toolchain.toml when bumping.
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.0"
          components: rustfmt, clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      # Build the frontend first so `dist/` exists before the Rust app compiles
      # (tauri::generate_context! embeds it). Uses the committed IPC bindings.
      - name: Build frontend
        run: pnpm --filter @novalis/frontend build

      # Frontend JS checks are OS-independent — run once (Linux) to save CI time.
      - name: Frontend lint (no hardcoded UI strings)
        if: matrix.os == 'ubuntu-latest'
        run: pnpm --filter @novalis/frontend lint

      - name: Frontend i18n catalogs up to date
        if: matrix.os == 'ubuntu-latest'
        run: pnpm --filter @novalis/frontend i18n:check

      # Recursive so every workspace package with a `test` script runs
      # (frontend + editor today); a new package's tests are picked up
      # without editing CI.
      - name: JS tests
        if: matrix.os == 'ubuntu-latest'
        run: pnpm -r test

      # `--if-present` so packages gain typechecking simply by adding a
      # `typecheck` script — harmless for packages that don't have one.
      - name: Typecheck (workspace packages)
        if: matrix.os == 'ubuntu-latest'
        run: pnpm -r --if-present run typecheck

      # The three release version stamps must stay in sync (see RELEASING.md).
      - name: Version stamps in sync
        if: matrix.os == 'ubuntu-latest'
        run: node scripts/check-versions.mjs

      - name: Rust format check
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      # The P2P sync end-to-end test drives a real two-endpoint QUIC loopback
      # (relays disabled) and is gated behind `p2p-loopback-test` so its
      # network-touching setup never gates the default fmt/clippy/test. Run it
      # explicitly on the Linux leg so CI actually exercises the encrypted
      # multi-endpoint sync + unknown-peer-refusal path (needs libasound2-dev,
      # installed above, for the desktop crate's cpal/ALSA link).
      - name: P2P loopback E2E (gated)
        if: matrix.os == 'ubuntu-latest'
        run: cargo test -p novalis-desktop --features p2p-loopback-test

      # Guard against Rust/TS drift: regenerated bindings must match what's
      # committed. Linux-only: the generated file is OS-independent, and the
      # Windows runner's line-ending handling makes the diff a flake vector.
      - name: Verify IPC bindings are up to date
        if: matrix.os == 'ubuntu-latest'
        run: |
          pnpm gen:bindings
          git diff --exit-code apps/desktop/frontend/src/ipc/bindings.ts

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    # Blocking. Accepted advisories live in `.cargo/audit.toml`, each with a
    # written justification and a revisit condition — a new advisory fails CI.
    # (`unmaintained`/`unsound` warnings — gtk3 bindings from Tauri's Linux
    # stack, anyhow, glib, paste, proc-macro-error, instant, unic-* — are
    # warnings, not failures.)
    steps:
      - uses: actions/checkout@v6
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
