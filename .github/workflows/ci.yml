name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      # Tauri's Linux build needs the WebKitGTK stack (see plan: Linux WebKitGTK risk).
      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libxdo-dev \
            patchelf \
            build-essential

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust (pinned by rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.93.0"
          components: rustfmt, clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      # Build the frontend first so `dist/` exists before the Rust app compiles
      # (tauri::generate_context! embeds it). Uses the committed IPC bindings.
      - name: Build frontend
        run: pnpm --filter @novalis/frontend build

      # Frontend JS checks are OS-independent — run once (Linux) to save CI time.
      - name: Frontend lint (no hardcoded UI strings)
        if: matrix.os == 'ubuntu-latest'
        run: pnpm --filter @novalis/frontend lint

      - name: Frontend i18n catalogs up to date
        if: matrix.os == 'ubuntu-latest'
        run: pnpm --filter @novalis/frontend i18n:check

      # Recursive so every workspace package with a `test` script runs
      # (frontend + editor today); a new package's tests are picked up
      # without editing CI.
      - name: JS tests
        if: matrix.os == 'ubuntu-latest'
        run: pnpm -r test

      - name: Rust format check
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      # Guard against Rust/TS drift: regenerated bindings must match what's committed.
      - name: Verify IPC bindings are up to date
        run: |
          pnpm gen:bindings
          git diff --exit-code apps/desktop/frontend/src/ipc/bindings.ts
